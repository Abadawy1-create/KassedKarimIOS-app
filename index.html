<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>قاصد كريم</title>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="قاصد كريم">
<link rel="apple-touch-icon" href="https://i.postimg.cc/PqqLK6vj/logo-psd-Photoroom.png">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">

<style>
body,html{
margin:0;
padding:0;
height:100%;
width:100%;
overflow:hidden;
background:#fff;
font-family:'Cairo',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
padding-top:env(safe-area-inset-top);
padding-bottom:env(safe-area-inset-bottom);
}

iframe{
width:100%;
height:100%;
border:none;
display:block;
opacity:0;
transition:.4s;
background:#fff;
}
iframe.visible{
opacity:1;
}

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#fff;
z-index:9999;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.title{
font-size:34px;
font-weight:900;
color:#0056b3;
}

.subtitle{
font-size:18px;
font-weight:700;
color:#ff8c00;
margin-top:6px;
}

.dots{
display:flex;
margin-top:25px;
}

.dot{
width:12px;
height:12px;
background:#ff8c00;
border-radius:50%;
margin:0 4px;
animation:bounce .6s infinite alternate;
}

.dot:nth-child(2){animation-delay:.15s}
.dot:nth-child(3){animation-delay:.3s}

@keyframes bounce{
to{transform:translateY(-10px)}
}
</style>

<script>

let iframeReady=false
let appVisible=false
let pollingTimer=null

function injectIframe(){

let deviceId=localStorage.getItem("PERSISTENT_DEVICE_ID")

if(!deviceId){
deviceId="DEV_"+Date.now().toString(36)+Math.random().toString(36).substr(2,9)
localStorage.setItem("PERSISTENT_DEVICE_ID",deviceId)
}

const gas="https://script.google.com/macros/s/AKfycbxco9D_Mz0yAXgqL_eQRgVkWimKanZjZHV2izKXw_yyUIxCexTxH9BrInRh5xqx_BtVrw/exec"

const iframe=document.createElement("iframe")
iframe.id="app"

iframe.src=gas+"#deviceId="+deviceId

document.body.appendChild(iframe)

}

function reveal(){

if(appVisible) return
appVisible=true

document.getElementById("app").classList.add("visible")

setTimeout(()=>{
document.getElementById("loader").style.display="none"
},900)

startPolling()

}

function startPolling(){

if(pollingTimer) clearInterval(pollingTimer)

pollingTimer=setInterval(()=>{

const frame=document.getElementById("app")

if(frame && frame.contentWindow){
frame.contentWindow.postMessage({type:"WAKE_UP"}, "*")
}

},10000)

}

window.addEventListener("message",(e)=>{

if(e.data && e.data.type==="IFRAME_READY"){
iframeReady=true
reveal()
}

})

document.addEventListener("visibilitychange",()=>{
if(document.visibilityState==="visible"){
wake()
}
})

window.addEventListener("focus",wake)
window.addEventListener("pageshow",wake)
document.addEventListener("touchstart",wake,{passive:true})

function wake(){
const frame=document.getElementById("app")
if(frame && frame.contentWindow){
frame.contentWindow.postMessage({type:"WAKE_UP"}, "*")
}
}

window.addEventListener("DOMContentLoaded",injectIframe)

</script>

</head>

<body>

<div id="loader">
<div class="title">قاصد كريم</div>
<div class="subtitle">التطبيق الذكي</div>
<div class="dots">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>
</div>

</body>
</html>
