<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>قاصد كريم</title>

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover">

<meta name="theme-color" content="#ffffff">

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="قاصد كريم">

<link rel="apple-touch-icon"
href="https://i.postimg.cc/PqqLK6vj/logo-psd-Photoroom.png">

<link rel="icon"
href="https://i.postimg.cc/PqqLK6vj/logo-psd-Photoroom.png">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">

<style>

html,body{
margin:0;
padding:0;
height:100%;
width:100%;
overflow:hidden;
background:#fff;
font-family:'Cairo',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
padding-top:env(safe-area-inset-top);
padding-bottom:env(safe-area-inset-bottom);
}

#app{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
border:none;
}

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#fff;
z-index:99999;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
transition:.6s;
}

.title{
font-size:36px;
font-weight:900;
color:#0056b3;
margin-bottom:5px;
}

.sub{
font-size:18px;
font-weight:700;
color:#ff8c00;
margin-bottom:35px;
}

.dotwrap{
display:flex;
}

.dot{
width:14px;
height:14px;
margin:0 5px;
background:#ff8c00;
border-radius:50%;
animation:bounce .6s infinite alternate;
}

.dot:nth-child(2){animation-delay:.15s}
.dot:nth-child(3){animation-delay:.3s}

@keyframes bounce{
to{transform:translateY(-12px)}
}

</style>
</head>

<body>

<div id="loader">
<div class="title">قاصد كريم</div>
<div class="sub">التطبيق الذكي</div>
<div class="dotwrap">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>
</div>

<iframe id="app"></iframe>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbxco9D_Mz0yAXgqL_eQRgVkWimKanZjZHV2izKXw_yyUIxCexTxH9BrInRh5xqx_BtVrw/exec";

const frame = document.getElementById("app");
const loader = document.getElementById("loader");

function getDeviceId(){
let id = localStorage.getItem("DEVICE_ID");
if(!id){
id = "DEV_" + Date.now().toString(36)
+ Math.random().toString(36).substr(2,5);
localStorage.setItem("DEVICE_ID",id);
}
return id;
}

function loadApp(){
frame.src =
GAS_URL +
"#deviceId=" + getDeviceId();
}

frame.onload = function(){
setTimeout(()=>{
loader.style.opacity="0";
setTimeout(()=>{
loader.style.display="none";
},600);
},700);
};

loadApp();

/* realtime refresh for ios */
setInterval(()=>{
try{
frame.contentWindow.postMessage(
{type:"PING"},
"*"
);
}catch(e){}
},10000);

/* wake on resume */
document.addEventListener("visibilitychange",()=>{
if(document.visibilityState==="visible"){
frame.src =
GAS_URL +
"?r=" + Date.now() +
"#deviceId=" + getDeviceId();
}
});

</script>

</body>
</html>
